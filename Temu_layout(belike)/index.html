<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temu Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">TEMU</div>

        <div class="search-box">
            <input type="text" placeholder="Cerca prodotti...">
        </div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Categorie</a>
            <a href="#">Offerte</a>
            <a href="#">Carrello</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Super Offerte</h1>
        <p>Fino al 90% di sconto</p>
        <button>Acquista Ora</button>
    </section>

    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Prodotto">
            <h3>Cuffie Bluetooth</h3>
            <p class="price">€9.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Prodotto">
            <h3>Smart Watch</h3>
            <p class="price">€19.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Prodotto">
            <h3>Power Bank</h3>
            <p class="price">€12.99</p>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/250" alt="Prodotto">
            <h3>Speaker Bluetooth</h3>
            <p class="price">€15.99</p>
        </div>

    </section>

</body>
</html>
